<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Anmol's Ice Cream</title>
    <style>
      /* Essential styling to keep it centered and clean */
      body {
        background-color: #1a1a1a;
        color: #e0e0e0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .signin-card {
        background-color: #2d2d2d;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 350px;
      }

      h2 {
        text-align: center;
        color: #ff6b9d;
        margin-bottom: 30px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.9rem;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 12px;
        background-color: #3d3d3d;
        border: 1px solid #444;
        border-radius: 6px;
        color: white;
        box-sizing: border-box; /* Crucial for padding/width logic */
      }

      .remember-me {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.85rem;
        cursor: pointer;
      }

      button {
        width: 100%;
        padding: 12px;
        background-color: #ff6b9d;
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        transition: background 0.3s;
      }

      button:hover {
        background-color: #e05586;
      }
    </style>
  </head>
  <body>
    <div class="signin-card">
      <h2>Sign In</h2>
      <form action="/login" method="post">
        {% csrf_token %}
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter username"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter password"
            required
          />
        </div>

        <div class="form-group">
          <label class="remember-me">
            <input type="checkbox" name="remember" /> Remember Me
          </label>
        </div>

        <button type="submit">Login</button>
      </form>
    </div>
  </body>
</html>
